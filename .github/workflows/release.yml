name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.6.1
      - run: npm ci
      - name: Publish to npm
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if [[ "$version" == *-* ]]; then
            dist_tag=next
          else
            dist_tag=latest
          fi
          npm publish --access public --provenance --tag "$dist_tag"
